<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album</title>
    <meta name="description"
        content="Explore a gallery of beautiful Latter-day Saint temples from South America, collected for the WDD 131 Web Fundamentals course.">
    <meta name="author" content="Adriana Sandoval">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/temples.js" defer></script>
</head>

<body>
    <header>
        <div>Temple Album</div>
        <button id="menu" title="Menu"></button>
        <nav class="navigation">
            <a href="#">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>
            <a href="#">Small</a>
        </nav>
    </header>
    <main>
        <h1>Temple Album</h1>
        <div class="gallery">
            <figure>
                <img src="images/bogota_colombia_temple.jpg" alt="Bogota Colombia Temple" loading="lazy">
                <figcaption>Bogota Colombia Temple</figcaption>
            </figure>
            <figure>
                <img src="images/barranquilla_temple.jpg" alt="Barranquilla Colombia Temple" loading="lazy">
                <figcaption>Barranquilla Colombia Temple</figcaption>
            </figure>
            <figure>
                <img src="images/buenos_aires_temple.jpg" alt="Buenos Aires Temple" loading="lazy">
                <figcaption>Buenos Aires Temple</figcaption>
            </figure>
            <figure>
                <img src="images/lima_peru_temple.jpg" alt="Lima Peru Temple" loading="lazy">
                <figcaption>Lima Peru Temple</figcaption>
            </figure>
            <figure>
                <img src="images/caracas_venezuela_temple.jpg" alt="Caracas Venezuela Temple" loading="lazy">
                <figcaption>Caracas Venezuela Temple</figcaption>
            </figure>
            <figure>
                <img src="images/asuncion_paraguay_temple.jpg" alt="Asuncion Paraguay Temple" loading="lazy">
                <figcaption>Asuncion Paraguay Temple</figcaption>
            </figure>
            <figure>
                <img src="images/montevideo_uruguay_temple.jpg" alt="Montevideo Uruguay Temple" loading="lazy">
                <figcaption>Montevideo Uruguay Temple</figcaption>
            </figure>
            <figure>
                <img src="images/cochabamba_bolivia_temple.jpg" alt="Cochabamba Bolivia Temple" loading="lazy">
                <figcaption>Cochabamba Bolivia Temple</figcaption>
            </figure>
            <figure>
                <img src="images/quito-ecuador-temple.jpg" alt="Quito Ecuador Temple" loading="lazy">
                <figcaption>Quito Ecuador Temple</figcaption>
            </figure>
        </div>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> Adriana Sandoval</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
